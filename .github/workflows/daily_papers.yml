name: Daily Papers Agent

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily
  workflow_dispatch:        # allow manual trigger for testing

permissions:
  contents: write           # needed to commit seen_papers.json back

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run papers agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m agent.main

      - name: Commit updated seen_papers.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_papers.json
          if git diff --cached --quiet; then
            echo "No changes to seen_papers.json — skipping commit"
          else
            git commit -m "chore: update seen_papers.json [skip ci]"
            git push
          fi
