name: Daily Papers Agent

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily
  workflow_dispatch:        # allow manual trigger for testing
    inputs:
      clear_seen_papers:
        description: "Clear seen papers so this run processes all fetched as new (one-time reset)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write           # needed to commit seen_papers.json back

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run papers agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          CLEAR_SEEN_PAPERS: ${{ inputs.clear_seen_papers }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m agent.main

      - name: Commit updated seen_papers.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_papers.json
          if git diff --cached --quiet; then
            echo "No changes to seen_papers.json — skipping commit"
          else
            git commit -m "chore: update seen_papers.json [skip ci]"
            git push
          fi
