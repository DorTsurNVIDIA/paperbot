name: Weekly Paper Digest

on:
  schedule:
    - cron: '30 8 * * 1'   # Monday 08:30 UTC, covering the previous ISO week
  workflow_dispatch:
    inputs:
      week:
        description: "Optional ISO week to post (YYYY-Www); defaults to last week"
        required: false
        type: string
      force:
        description: "Post even if this week was already delivered"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: paperbot-production
  cancel-in-progress: false

jobs:
  post-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post weekly digest
        env:
          DIGEST_WEEK: ${{ github.event_name == 'workflow_dispatch' && inputs.week || '' }}
          FORCE_WEEKLY_DIGEST: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m agent.weekly_digest

      - name: Commit weekly digest state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_digest_state.json
          if git diff --cached --quiet; then
            echo "No weekly digest state changes — skipping commit"
          else
            git commit -m "chore: update weekly digest state [skip ci]"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push
          fi
